<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#00d9a6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- Border gradient ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#grad)" stroke-width="2.5"/>
  <!-- Letter A -->
  <text x="10" y="46" font-family="'Arial Black', sans-serif" font-weight="900" font-size="36" fill="url(#grad)">A</text>
  <!-- Letter E - smaller, offset -->
  <text x="34" y="52" font-family="'Arial Black', sans-serif" font-weight="900" font-size="26" fill="#00d9a6" opacity="0.85">E</text>
  <!-- Small dot accent -->
  <circle cx="56" cy="14" r="4" fill="#6c63ff" opacity="0.8"/>
</svg>
